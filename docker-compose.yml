services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cryptovol
      POSTGRES_USER: cryptovol
      POSTGRES_PASSWORD: cryptovol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptovol"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://cryptovol:cryptovol@db:5432/cryptovol
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:5174
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
